<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Cave — Inventaire</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
:root {
  --noir:#0a0806; --bois:#1a1209; --brun:#2d1f0e;
  --or:#c9a84c; --or-pale:#e8c97a; --or-mat:#8b6914;
  --creme:#f0e6cc; --creme-pale:#faf4e8;
  --rouge:#7a1a1a; --rouge-vif:#a02020;
  --texte:#d4c4a0; --texte-pale:#8a7a60;
  --verre:rgba(255,255,255,0.04); --verre-bord:rgba(201,168,76,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Josefin Sans',sans-serif;background:var(--noir);color:var(--texte);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(122,26,26,0.12) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(45,31,14,0.8) 0%,transparent 50%);pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 20px 60px;}

/* HEADER */
header{text-align:center;padding:40px 0 32px;border-bottom:1px solid var(--verre-bord);margin-bottom:32px;}
header::after{content:'';display:block;width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--or),transparent);margin:16px auto 0;}
.header-icon{font-size:2.2rem;display:block;margin-bottom:8px;}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,6vw,3.5rem);font-weight:300;letter-spacing:0.12em;color:var(--or-pale);}
h1 em{font-style:italic;color:var(--creme);}
.subtitle{font-size:0.68rem;letter-spacing:0.3em;color:var(--texte-pale);text-transform:uppercase;margin-top:6px;}

/* SAVE BAR */
.save-bar{margin-top:16px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;}
.save-bar-btn{background:transparent;border:1px solid var(--verre-bord);color:var(--texte-pale);font-family:'Josefin Sans',sans-serif;font-size:0.63rem;letter-spacing:0.18em;text-transform:uppercase;padding:7px 14px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all 0.25s;}
.save-bar-btn:hover{border-color:var(--or-mat);color:var(--or);}
.save-bar-btn.drive:hover{border-color:rgba(80,180,80,0.6);color:#6dba6d;}
.save-bar-btn.imp:hover{border-color:rgba(80,180,80,0.6);color:#6dba6d;}
#last-save{font-size:0.6rem;letter-spacing:0.1em;color:var(--texte-pale);font-style:italic;font-family:'Cormorant Garamond',serif;}

/* TABS */
.tabs{display:flex;margin-bottom:32px;border:1px solid var(--verre-bord);background:var(--bois);}
.tab-btn{flex:1;padding:13px 10px;background:transparent;border:none;border-right:1px solid var(--verre-bord);color:var(--texte-pale);font-family:'Josefin Sans',sans-serif;font-size:0.65rem;letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:5px;position:relative;}
.tab-btn:last-child{border-right:none;}
.tab-btn.active{color:var(--or);background:rgba(201,168,76,0.07);}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--or),transparent);}
.tab-btn:hover:not(.active){color:var(--texte);background:rgba(255,255,255,0.02);}
.badge{background:var(--rouge);color:var(--creme-pale);font-size:0.58rem;padding:2px 6px;border-radius:20px;min-width:18px;text-align:center;}

/* PANELS */
.panel{display:none;}
.panel.active{display:block;animation:fadeIn 0.35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* STATS */
.stats-bar{display:flex;border:1px solid var(--verre-bord);background:var(--bois);margin-bottom:24px;}
.stat{flex:1;padding:14px 10px;text-align:center;border-right:1px solid var(--verre-bord);}
.stat:last-child{border-right:none;}
.stat-val{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-weight:300;color:var(--or-pale);display:block;line-height:1;margin-bottom:3px;}
.stat-val.red{color:var(--rouge-vif);}
.stat-label{font-size:0.56rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--texte-pale);}

/* TOOLBAR */
.toolbar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center;}
.search-wrap{flex:1;min-width:180px;position:relative;}
.search-wrap input{width:100%;background:var(--verre);border:1px solid var(--verre-bord);color:var(--creme);font-family:'Josefin Sans',sans-serif;font-size:0.75rem;letter-spacing:0.08em;padding:10px 12px 10px 36px;outline:none;transition:border-color 0.2s;}
.search-wrap input:focus{border-color:var(--or-mat);}
.search-wrap input::placeholder{color:var(--texte-pale);}
.search-wrap::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:0.8rem;filter:grayscale(1) opacity(0.5);}
.filter-select{background:var(--verre);border:1px solid var(--verre-bord);color:var(--texte);font-family:'Josefin Sans',sans-serif;font-size:0.7rem;padding:10px 12px;outline:none;cursor:pointer;min-width:140px;}
.filter-select option{background:var(--brun);}
.btn{padding:10px 16px;border:none;cursor:pointer;font-family:'Josefin Sans',sans-serif;font-size:0.68rem;letter-spacing:0.15em;text-transform:uppercase;transition:all 0.25s;display:flex;align-items:center;gap:6px;}
.btn-or{background:linear-gradient(135deg,var(--or-mat),var(--or));color:var(--noir);}
.btn-or:hover{background:linear-gradient(135deg,var(--or),var(--or-pale));transform:translateY(-1px);}
.btn-ghost{background:transparent;border:1px solid var(--verre-bord);color:var(--texte-pale);}
.btn-ghost:hover{border-color:var(--or-mat);color:var(--or);}
.btn-danger{background:transparent;border:1px solid rgba(160,32,32,0.4);color:var(--rouge-vif);}
.btn-danger:hover{background:rgba(160,32,32,0.15);border-color:var(--rouge-vif);}

/* CARDS */
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;}
.item-card{background:var(--bois);border:1px solid var(--verre-bord);padding:18px;position:relative;transition:all 0.3s;}
.item-card:hover{border-color:rgba(201,168,76,0.3);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.4);}
.item-card.rupture{border-color:rgba(160,32,32,0.4);background:rgba(122,26,26,0.06);}
.item-card.rupture::before{content:'RUPTURE';position:absolute;top:10px;right:10px;font-size:0.52rem;letter-spacing:0.2em;color:var(--rouge-vif);border:1px solid var(--rouge-vif);padding:2px 6px;}
.item-cat{font-size:0.58rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--or-mat);margin-bottom:5px;}
.item-name{font-family:'Cormorant Garamond',serif;font-size:1.25rem;color:var(--creme-pale);margin-bottom:3px;line-height:1.2;}
.item-detail{font-size:0.66rem;color:var(--texte-pale);font-style:italic;font-family:'Cormorant Garamond',serif;margin-bottom:12px;}
.item-alerte{font-size:0.58rem;letter-spacing:0.15em;color:var(--or);text-transform:uppercase;margin-bottom:8px;}
.item-footer{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--verre-bord);padding-top:12px;}
.qty-control{display:flex;align-items:center;gap:10px;}
.qty-btn{width:26px;height:26px;background:var(--verre);border:1px solid var(--verre-bord);color:var(--or);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;line-height:1;}
.qty-btn:hover{background:rgba(201,168,76,0.12);border-color:var(--or-mat);}
.qty-val{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;color:var(--or-pale);min-width:28px;text-align:center;line-height:1;}
.qty-val.zero{color:var(--rouge-vif);}
.qty-unit{font-size:0.58rem;color:var(--texte-pale);letter-spacing:0.1em;text-transform:uppercase;margin-top:1px;text-align:center;}
.item-actions{display:flex;gap:6px;}
.icon-btn{width:28px;height:28px;background:transparent;border:1px solid var(--verre-bord);color:var(--texte-pale);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:0.8rem;transition:all 0.2s;}
.icon-btn:hover{border-color:var(--or-mat);color:var(--or);}
.icon-btn.del:hover{border-color:var(--rouge-vif);color:var(--rouge-vif);}
.empty-state{text-align:center;padding:70px 20px;color:var(--texte-pale);grid-column:1/-1;}
.empty-state .eicon{font-size:2.8rem;display:block;margin-bottom:14px;opacity:0.4;}
.empty-state p{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-style:italic;margin-bottom:18px;}

/* SHOPPING */
.shopping-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
.shopping-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;color:var(--or-pale);}
.shop-list{display:flex;flex-direction:column;gap:10px;}
.shop-item{background:var(--bois);border:1px solid rgba(160,32,32,0.25);border-left:3px solid var(--rouge-vif);padding:13px 16px;display:flex;align-items:center;gap:14px;}
.shop-item.done-item{opacity:0.4;}
.shop-info{flex:1;}
.shop-name{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--creme);margin-bottom:2px;}
.shop-cat{font-size:0.6rem;letter-spacing:0.18em;color:var(--texte-pale);text-transform:uppercase;}
.shop-qty-wrap{display:flex;align-items:center;gap:6px;}
.shop-qty-label{font-size:0.6rem;letter-spacing:0.1em;color:var(--texte-pale);text-transform:uppercase;}
.shop-qty-input{width:55px;background:rgba(201,168,76,0.07);border:1px solid var(--or-mat);color:var(--or-pale);font-family:'Cormorant Garamond',serif;font-size:1.1rem;text-align:center;padding:4px;outline:none;}
.shop-check{width:30px;height:30px;background:transparent;border:1px solid rgba(160,32,32,0.4);color:var(--rouge-vif);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.shop-check.done{background:rgba(80,160,80,0.1);border-color:#50a050;color:#50a050;}
.shop-empty{text-align:center;padding:70px 20px;color:var(--texte-pale);}
.shop-empty .eicon{font-size:2.8rem;display:block;margin-bottom:14px;opacity:0.4;}
.shop-empty p{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-style:italic;}

/* CATEGORIES */
.cat-panel-header{margin-bottom:20px;}
.cat-panel-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;color:var(--or-pale);margin-bottom:4px;}
.cat-add-row{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;}
.cat-input{flex:1;min-width:200px;background:var(--verre);border:1px solid var(--verre-bord);color:var(--creme);font-family:'Josefin Sans',sans-serif;font-size:0.78rem;padding:10px 14px;outline:none;transition:border-color 0.2s;}
.cat-input:focus{border-color:var(--or-mat);}
.cat-input::placeholder{color:var(--texte-pale);}
.cat-grid{display:flex;flex-direction:column;gap:8px;}
.cat-card{background:var(--bois);border:1px solid var(--verre-bord);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;transition:border-color 0.2s;}
.cat-card:hover{border-color:rgba(201,168,76,0.25);}
.cat-name{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--creme);margin-bottom:2px;}
.cat-count{font-size:0.6rem;letter-spacing:0.18em;color:var(--texte-pale);text-transform:uppercase;}
.cat-count span{color:var(--or-mat);}
.cat-actions{display:flex;gap:6px;flex-shrink:0;}
.cat-empty{text-align:center;padding:50px 20px;color:var(--texte-pale);font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-style:italic;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(5,3,2,0.88);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--brun);border:1px solid var(--verre-bord);padding:32px 28px;width:100%;max-width:460px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.8);}
.modal::before{content:'';position:absolute;top:0;left:28px;right:28px;height:1px;background:linear-gradient(90deg,transparent,var(--or),transparent);}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;color:var(--or-pale);margin-bottom:4px;}
.modal-sub{font-size:0.62rem;letter-spacing:0.2em;color:var(--texte-pale);text-transform:uppercase;margin-bottom:24px;}
.modal-close{position:absolute;top:12px;right:14px;background:transparent;border:none;color:var(--texte-pale);font-size:1.1rem;cursor:pointer;padding:4px 8px;transition:color 0.2s;}
.modal-close:hover{color:var(--or);}
.form-row{margin-bottom:16px;}
.form-row label{display:block;font-size:0.6rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--texte-pale);margin-bottom:6px;}
.form-row input,.form-row select,.form-row textarea{width:100%;background:rgba(10,8,6,0.6);border:1px solid var(--verre-bord);color:var(--creme);font-family:'Josefin Sans',sans-serif;font-size:0.8rem;padding:10px 12px;outline:none;transition:border-color 0.2s;resize:vertical;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--or-mat);}
.form-row select option{background:var(--brun);}
.form-row textarea{min-height:65px;}
.form-row input[type=number]{-moz-appearance:textfield;}
.form-row input[type=number]::-webkit-inner-spin-button{display:none;}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:24px;padding-top:18px;border-top:1px solid var(--verre-bord);}

/* CONFIRM */
#confirm-overlay{position:fixed;inset:0;background:rgba(5,3,2,0.88);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;}
.confirm-box{background:var(--brun);border:1px solid var(--rouge-vif);border-top:2px solid var(--rouge-vif);padding:26px 26px 20px;width:100%;max-width:360px;box-shadow:0 16px 48px rgba(0,0,0,0.8);}
.confirm-msg{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--creme);margin-bottom:20px;line-height:1.5;white-space:pre-line;}
.confirm-btns{display:flex;gap:10px;justify-content:flex-end;}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--brun);border:1px solid var(--or-mat);border-left:3px solid var(--or);color:var(--creme);font-family:'Josefin Sans',sans-serif;font-size:0.7rem;letter-spacing:0.1em;padding:11px 16px;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,0.6);animation:toastIn 0.3s ease;}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

@media(max-width:600px){
  .stats-bar{flex-wrap:wrap;}
  .stat{flex:1 1 45%;border-bottom:1px solid var(--verre-bord);}
  .form-2col{grid-template-columns:1fr;}
  .tab-btn{font-size:0.58rem;padding:11px 4px;}
  .cat-add-row{flex-direction:column;}
  .shop-qty-wrap{flex-direction:column;gap:3px;}
}
</style>
</head>
<body>
<div class="app">

  <header>
    <span class="header-icon">🍾</span>
    <h1><em>Ma</em> Cave</h1>
    <p class="subtitle">Gestion d'inventaire &middot; Stocks &amp; Approvisionnements</p>
    <div class="save-bar">
      <button class="save-bar-btn drive" onclick="exportEtDrive()">☁ Exporter + ouvrir Drive</button>
      <button class="save-bar-btn imp" onclick="document.getElementById('import-file').click()">⬆ Importer sauvegarde</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
      <span id="last-save"></span>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('inventaire',this)">🗃 Inventaire</button>
    <button class="tab-btn" onclick="switchTab('liste',this)">🛒 Liste <span class="badge" id="badge-liste">0</span></button>
    <button class="tab-btn" onclick="switchTab('categories',this)">🏷 Catégories</button>
  </div>

  <div class="panel active" id="panel-inventaire">
    <div class="stats-bar" id="stats-bar"></div>
    <div class="toolbar">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Rechercher…" oninput="renderInventaire()">
      </div>
      <select class="filter-select" id="filter-cat" onchange="renderInventaire()">
        <option value="">Toutes catégories</option>
      </select>
      <button class="btn btn-ghost" onclick="toggleSort()">⇅ Trier</button>
      <button class="btn btn-or" onclick="openModal()">＋ Ajouter</button>
    </div>
    <div class="items-grid" id="items-grid"></div>
  </div>

  <div class="panel" id="panel-liste">
    <div class="shopping-header">
      <div>
        <p class="subtitle">Articles à réapprovisionner</p>
        <h2 class="shopping-title">Liste d'Achats</h2>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="printListe()">🖨 Imprimer</button>
        <button class="btn btn-danger" onclick="clearDone()">✕ Effacer cochés</button>
      </div>
    </div>
    <div class="shop-list" id="shop-list"></div>
  </div>

  <div class="panel" id="panel-categories">
    <div class="cat-panel-header">
      <p class="subtitle">Gérer vos catégories</p>
      <h2 class="cat-panel-title">Catégories</h2>
    </div>
    <div class="cat-add-row">
      <input type="text" class="cat-input" id="new-cat-input" placeholder="Nom de la nouvelle catégorie…" onkeydown="if(event.key==='Enter')addCategory()">
      <button class="btn btn-or" onclick="addCategory()">＋ Créer</button>
    </div>
    <div class="cat-grid" id="cat-grid"></div>
  </div>

</div>

<!-- MODAL ARTICLE -->
<div class="modal-overlay" id="modal-overlay" style="display:none">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 class="modal-title" id="modal-title">Nouvel article</h2>
    <p class="modal-sub" id="modal-sub">Ajouter à l'inventaire</p>
    <div class="form-row">
      <label>Nom de l'article *</label>
      <input type="text" id="f-nom" placeholder="ex : Château Margaux 2018">
    </div>
    <div class="form-2col">
      <div class="form-row">
        <label>Catégorie *</label>
        <select id="f-cat"><option value="">Choisir…</option></select>
      </div>
      <div class="form-row">
        <label>Unité</label>
        <select id="f-unit">
          <option>bouteille(s)</option><option>canette(s)</option><option>boîte(s)</option>
          <option>pack(s)</option><option>litre(s)</option><option>kg</option><option>unité(s)</option>
        </select>
      </div>
    </div>
    <div class="form-2col">
      <div class="form-row">
        <label>Quantité en stock *</label>
        <input type="number" id="f-qty" placeholder="0" min="0">
      </div>
      <div class="form-row">
        <label>Seuil d'alerte</label>
        <input type="number" id="f-seuil" placeholder="0" min="0">
      </div>
    </div>
    <div class="form-row">
      <label>Notes / Millésime / Référence</label>
      <textarea id="f-notes" placeholder="Détails, étagère…"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-or" onclick="saveItem()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL RENOMMER -->
<div class="modal-overlay" id="rename-overlay" style="display:none">
  <div class="modal">
    <button class="modal-close" onclick="closeRename()">✕</button>
    <h2 class="modal-title">Renommer</h2>
    <p class="modal-sub">Modifier le nom de la catégorie</p>
    <div class="form-row">
      <label>Nouveau nom *</label>
      <input type="text" id="rename-input" onkeydown="if(event.key==='Enter')saveRename()">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeRename()">Annuler</button>
      <button class="btn btn-or" onclick="saveRename()">Renommer</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY = 'cave_v3';
const DEFAULT_CATS = ['Vin rouge','Vin blanc','Vin rosé','Champagne','Bière','Spiritueux','Eau','Soda','Jus','Autre boisson','Conserves','Épicerie sèche','Autre'];
let items=[], categories=[], doneItems={}, editId=null, renameOld=null, sortAsc=true;

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }

function load(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw){ const d=JSON.parse(raw); items=d.items||[]; categories=d.categories||[...DEFAULT_CATS]; doneItems=d.doneItems||{}; }
    else{ categories=[...DEFAULT_CATS]; items=[
      {id:uid(),nom:'Château Margaux 2018',cat:'Vin rouge',qty:6,unit:'bouteille(s)',notes:'Étagère 3',seuil:2},
      {id:uid(),nom:'Blanc de Blanc Sancerre',cat:'Vin blanc',qty:0,unit:'bouteille(s)',notes:'',seuil:1},
      {id:uid(),nom:'Perrier-Jouët Grand Brut',cat:'Champagne',qty:3,unit:'bouteille(s)',notes:'Réfrigérateur',seuil:1},
      {id:uid(),nom:'Heineken 50cl',cat:'Bière',qty:0,unit:'canette(s)',notes:'',seuil:6},
      {id:uid(),nom:'Glenfiddich 12 ans',cat:'Spiritueux',qty:1,unit:'bouteille(s)',notes:'',seuil:1},
      {id:uid(),nom:'Evian 1.5L',cat:'Eau',qty:12,unit:'bouteille(s)',notes:'Stock tournant',seuil:6},
    ];}
  }catch(e){ categories=[...DEFAULT_CATS]; items=[]; doneItems={}; }
  persist();
}

function persist(){ localStorage.setItem(STORAGE_KEY,JSON.stringify({items,categories,doneItems})); }

// ── TABS ──────────────────────────────────────────────────────
function switchTab(name,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='liste') renderShoppingList();
  if(name==='categories') renderCategories();
}

// ── INVENTAIRE ────────────────────────────────────────────────
function renderInventaire(){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  const cf=document.getElementById('filter-cat').value;
  let list=items.filter(i=>(!cf||i.cat===cf)&&(!q||i.nom.toLowerCase().includes(q)||(i.notes||'').toLowerCase().includes(q)||i.cat.toLowerCase().includes(q)));
  if(sortAsc) list.sort((a,b)=>a.nom.localeCompare(b.nom));
  else list.sort((a,b)=>b.qty-a.qty);
  const grid=document.getElementById('items-grid');
  grid.innerHTML=list.length ? list.map(it=>{
    const r=it.qty===0, al=it.seuil>0&&it.qty>0&&it.qty<=it.seuil;
    return `<div class="item-card${r?' rupture':''}">
      <div class="item-cat">${esc(it.cat)}</div>
      <div class="item-name">${esc(it.nom)}</div>
      ${it.notes?`<div class="item-detail">${esc(it.notes)}</div>`:'<div style="margin-bottom:12px"></div>'}
      ${al?'<div class="item-alerte">⚠ Stock bas</div>':''}
      <div class="item-footer">
        <div class="qty-control">
          <button class="qty-btn" data-id="${it.id}" data-delta="-1">−</button>
          <div><div class="qty-val${r?' zero':''}">${it.qty}</div><div class="qty-unit">${esc(it.unit)}</div></div>
          <button class="qty-btn" data-id="${it.id}" data-delta="1">＋</button>
        </div>
        <div class="item-actions">
          <button class="icon-btn" data-edit="${it.id}">✏</button>
          <button class="icon-btn del" data-del="${it.id}">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('') : `<div class="empty-state"><span class="eicon">🍾</span><p>Aucun article trouvé</p><button class="btn btn-or" onclick="openModal()">＋ Ajouter</button></div>`;
  updateStats(); updateCatFilter(); updateBadge();
}

document.getElementById('items-grid').addEventListener('click',e=>{
  const q=e.target.closest('[data-delta]'); if(q){changeQty(q.dataset.id,parseInt(q.dataset.delta));return;}
  const ed=e.target.closest('[data-edit]'); if(ed){openModal(ed.dataset.edit);return;}
  const dl=e.target.closest('[data-del]'); if(dl){deleteItem(dl.dataset.del);}
});

function changeQty(id,delta){
  const it=items.find(i=>i.id===id); if(!it) return;
  it.qty=Math.max(0,it.qty+delta); persist(); renderInventaire();
  if(it.qty===0) toast('⚠ '+it.nom+' — Rupture !');
}

function updateStats(){
  const t=items.length,tq=items.reduce((s,i)=>s+i.qty,0),r=items.filter(i=>i.qty===0).length,al=items.filter(i=>i.seuil>0&&i.qty>0&&i.qty<=i.seuil).length;
  document.getElementById('stats-bar').innerHTML=
    `<div class="stat"><span class="stat-val">${t}</span><span class="stat-label">Articles</span></div>
     <div class="stat"><span class="stat-val">${tq}</span><span class="stat-label">Unités</span></div>
     <div class="stat"><span class="stat-val${al?' red':''}">${al}</span><span class="stat-label">Stock bas</span></div>
     <div class="stat"><span class="stat-val${r?' red':''}">${r}</span><span class="stat-label">Ruptures</span></div>`;
}

function updateCatFilter(){
  const sel=document.getElementById('filter-cat'),cur=sel.value;
  sel.innerHTML='<option value="">Toutes catégories</option>'+[...categories].sort().map(c=>`<option value="${c}"${c===cur?' selected':''}>${esc(c)}</option>`).join('');
}

function updateBadge(){ document.getElementById('badge-liste').textContent=getShopItems().length; }
function toggleSort(){ sortAsc=!sortAsc; renderInventaire(); toast(sortAsc?'Tri A → Z':'Tri stock décroissant'); }

// ── CRUD ARTICLES ─────────────────────────────────────────────
function openModal(id){
  editId=id||null;
  const sel=document.getElementById('f-cat');
  sel.innerHTML='<option value="">Choisir…</option>'+[...categories].sort().map(c=>`<option value="${c}">${esc(c)}</option>`).join('');
  if(editId){
    const it=items.find(i=>i.id===editId); if(!it) return;
    document.getElementById('modal-title').textContent="Modifier l'article";
    document.getElementById('modal-sub').textContent='Mise à jour';
    document.getElementById('f-nom').value=it.nom; sel.value=it.cat;
    document.getElementById('f-unit').value=it.unit; document.getElementById('f-qty').value=it.qty;
    document.getElementById('f-seuil').value=it.seuil||0; document.getElementById('f-notes').value=it.notes||'';
  }else{
    document.getElementById('modal-title').textContent='Nouvel article';
    document.getElementById('modal-sub').textContent="Ajouter à l'inventaire";
    ['f-nom','f-notes'].forEach(id=>document.getElementById(id).value='');
    sel.value=''; document.getElementById('f-unit').value='bouteille(s)';
    document.getElementById('f-qty').value=''; document.getElementById('f-seuil').value=0;
  }
  document.getElementById('modal-overlay').style.display='flex';
  setTimeout(()=>document.getElementById('f-nom').focus(),80);
}

function closeModal(){ document.getElementById('modal-overlay').style.display='none'; editId=null; }

function saveItem(){
  const nom=document.getElementById('f-nom').value.trim();
  const cat=document.getElementById('f-cat').value;
  const unit=document.getElementById('f-unit').value;
  const qty=parseInt(document.getElementById('f-qty').value)||0;
  const seuil=parseInt(document.getElementById('f-seuil').value)||0;
  const notes=document.getElementById('f-notes').value.trim();
  if(!nom){toast('⚠ Le nom est obligatoire');return;}
  if(!cat){toast('⚠ La catégorie est obligatoire');return;}
  if(editId){ const it=items.find(i=>i.id===editId); if(it) Object.assign(it,{nom,cat,unit,qty,seuil,notes}); toast('Article mis à jour'); }
  else{ items.push({id:uid(),nom,cat,unit,qty,seuil,notes}); toast('Article ajouté'); }
  persist(); closeModal(); renderInventaire();
}

function deleteItem(id){
  const it=items.find(i=>i.id===id); if(!it) return;
  showConfirm('Supprimer "'+it.nom+'" ?',()=>{ items=items.filter(i=>i.id!==id); persist(); renderInventaire(); toast('Article supprimé'); });
}

// ── SHOPPING LIST ─────────────────────────────────────────────
function getShopItems(){ return items.filter(i=>i.qty===0||(i.seuil>0&&i.qty<=i.seuil)); }

function renderShoppingList(){
  const list=getShopItems(),c=document.getElementById('shop-list');
  if(!list.length){ c.innerHTML='<div class="shop-empty"><span class="eicon">✅</span><p>Tous les stocks sont complets.<br><em>Votre cave est bien approvisionnée.</em></p></div>'; updateBadge(); return; }
  c.innerHTML=list.map(it=>{
    const done=!!doneItems[it.id],sug=Math.max(1,(it.seuil||0)*2||6);
    return `<div class="shop-item${done?' done-item':''}">
      <div class="shop-info"><div class="shop-name">${esc(it.nom)}</div><div class="shop-cat">${esc(it.cat)} — ${it.qty===0?'Rupture':'Stock bas ('+it.qty+')'}</div></div>
      <div class="shop-qty-wrap">
        <span class="shop-qty-label">À acheter</span>
        <input class="shop-qty-input" type="number" id="sq-${it.id}" value="${sug}" min="1">
        <span class="shop-qty-label">${esc(it.unit)}</span>
      </div>
      <button class="shop-check${done?' done':''}" data-shopid="${it.id}">${done?'✓':'○'}</button>
    </div>`;
  }).join('');
  c.querySelectorAll('[data-shopid]').forEach(btn=>btn.addEventListener('click',()=>toggleDone(btn.dataset.shopid)));
  updateBadge();
}

function toggleDone(id){ doneItems[id]=!doneItems[id]; persist(); renderShoppingList(); }

function clearDone(){
  const done=Object.keys(doneItems).filter(k=>doneItems[k]);
  if(!done.length){toast('Aucun article coché');return;}
  showConfirm('Réapprovisionner les '+done.length+' article(s) coché(s) ?',()=>{
    done.forEach(id=>{ const it=items.find(i=>i.id===id),el=document.getElementById('sq-'+id); if(it&&el) it.qty+=parseInt(el.value)||0; delete doneItems[id]; });
    persist(); renderInventaire(); renderShoppingList(); toast(done.length+' article(s) réapprovisionné(s) ✓');
  });
}

function printListe(){
  const list=getShopItems(); if(!list.length){toast('Liste vide');return;}
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Liste d'achats</title>
  <style>body{font-family:Georgia,serif;padding:40px}h1{font-size:1.6rem;margin-bottom:4px}p.d{font-size:0.8rem;color:#777;margin-bottom:24px}
  table{width:100%;border-collapse:collapse}th{text-align:left;border-bottom:2px solid #333;padding:8px 10px;font-size:0.7rem;text-transform:uppercase}
  td{padding:9px 10px;border-bottom:1px solid #ddd}</style></head><body>
  <h1>🍾 Liste d'achats — Ma Cave</h1><p class="d">${new Date().toLocaleDateString('fr-FR',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
  <table><thead><tr><th>✓</th><th>Article</th><th>Catégorie</th><th>Statut</th><th>Qté</th></tr></thead><tbody>
  ${list.map(it=>`<tr><td>☐</td><td>${it.nom}</td><td>${it.cat}</td><td>${it.qty===0?'Rupture':'Stock bas ('+it.qty+')'}</td><td>${Math.max(1,(it.seuil||0)*2||6)} ${it.unit}</td></tr>`).join('')}
  </tbody></table></body></html>`;
  const w=window.open('','_blank'); w.document.write(html); w.document.close(); w.print();
}

// ── CATEGORIES ────────────────────────────────────────────────
function renderCategories(){
  const grid=document.getElementById('cat-grid');
  if(!categories.length){grid.innerHTML='<div class="cat-empty">Aucune catégorie — créez-en une ci-dessus.</div>';return;}
  const sorted=[...categories].sort();
  grid.innerHTML=sorted.map((cat,idx)=>{
    const count=items.filter(i=>i.cat===cat).length;
    return `<div class="cat-card">
      <div><div class="cat-name">${esc(cat)}</div><div class="cat-count"><span>${count}</span> article${count!==1?'s':''}</div></div>
      <div class="cat-actions">
        <button class="icon-btn" data-ri="${idx}">✏</button>
        <button class="icon-btn del" data-di="${idx}">🗑</button>
      </div>
    </div>`;
  }).join('');
  grid.querySelectorAll('[data-ri]').forEach(btn=>btn.addEventListener('click',()=>openRename(sorted[+btn.dataset.ri])));
  grid.querySelectorAll('[data-di]').forEach(btn=>btn.addEventListener('click',()=>deleteCategory(sorted[+btn.dataset.di])));
}

function addCategory(){
  const input=document.getElementById('new-cat-input'),name=input.value.trim();
  if(!name) return;
  if(categories.map(c=>c.toLowerCase()).includes(name.toLowerCase())){toast('Cette catégorie existe déjà');return;}
  categories.push(name); persist(); input.value=''; renderCategories(); renderInventaire(); toast('Catégorie "'+name+'" créée');
}

function deleteCategory(cat){
  const count=items.filter(i=>i.cat===cat).length;
  const msg=count>0?'Supprimer "'+cat+'" ?\nLes '+count+' article(s) seront déplacés en "Sans catégorie".':'Supprimer "'+cat+'" ?';
  showConfirm(msg,()=>{
    if(count>0){ items.forEach(i=>{if(i.cat===cat)i.cat='Sans catégorie';}); if(!categories.includes('Sans catégorie'))categories.push('Sans catégorie'); }
    categories=categories.filter(c=>c!==cat); persist(); renderCategories(); renderInventaire(); toast('Catégorie supprimée');
  });
}

function openRename(cat){
  renameOld=cat; document.getElementById('rename-input').value=cat;
  document.getElementById('rename-overlay').style.display='flex';
  setTimeout(()=>document.getElementById('rename-input').select(),80);
}
function closeRename(){ document.getElementById('rename-overlay').style.display='none'; renameOld=null; }
function saveRename(){
  const n=document.getElementById('rename-input').value.trim();
  if(!n) return; if(n===renameOld){closeRename();return;}
  if(categories.map(c=>c.toLowerCase()).includes(n.toLowerCase())){toast('Ce nom existe déjà');return;}
  categories=categories.map(c=>c===renameOld?n:c);
  items.forEach(i=>{if(i.cat===renameOld)i.cat=n;});
  persist(); closeRename(); renderCategories(); renderInventaire(); toast('Renommé en "'+n+'"');
}

// ── EXPORT / IMPORT ───────────────────────────────────────────
function exportEtDrive(){
  // 1. Téléchargement local
  const json=JSON.stringify({items,doneItems,categories,exportedAt:new Date().toISOString(),version:3},null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='cave-sauvegarde-'+new Date().toLocaleDateString('fr-FR').replace(/\//g,'-')+'.json';
  a.click();
  URL.revokeObjectURL(url);
  // 2. Ouvre Google Drive après 1 seconde
  setTimeout(()=>{
    window.open('https://drive.google.com/drive/my-drive','_blank');
    toast('✓ Fichier téléchargé — dépose-le dans Drive');
  },1000);
  // Màj horodatage
  const now=new Date().toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  document.getElementById('last-save').textContent='Export : '+now;
}

function importData(event){
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!Array.isArray(data.items)) throw new Error();
      showConfirm('Importer "'+file.name+'" ?\nToutes les données actuelles seront remplacées.',()=>{
        items=data.items||[]; doneItems=data.doneItems||{}; categories=data.categories||[...DEFAULT_CATS];
        persist(); renderInventaire(); toast('✓ Données importées');
      });
    }catch(e){toast('⚠ Fichier invalide');}
  };
  reader.readAsText(file); event.target.value='';
}

// ── CONFIRM ───────────────────────────────────────────────────
function showConfirm(msg,onOk){
  const old=document.getElementById('confirm-overlay'); if(old) old.remove();
  const el=document.createElement('div'); el.id='confirm-overlay';
  el.innerHTML=`<div class="confirm-box"><p class="confirm-msg">${esc(msg)}</p><div class="confirm-btns"><button class="btn btn-ghost" id="cc-no">Annuler</button><button class="btn btn-danger" id="cc-yes">Confirmer</button></div></div>`;
  document.body.appendChild(el);
  document.getElementById('cc-no').onclick=()=>el.remove();
  document.getElementById('cc-yes').onclick=()=>{el.remove();onOk();};
}

// ── UTILS ─────────────────────────────────────────────────────
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function toast(msg){
  const old=document.querySelector('.toast'); if(old) old.remove();
  const el=document.createElement('div'); el.className='toast'; el.textContent=msg;
  document.body.appendChild(el); setTimeout(()=>el.remove(),3000);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeModal(); closeRename(); const c=document.getElementById('confirm-overlay'); if(c)c.remove(); }
  if(e.key==='Enter'){
    if(document.getElementById('modal-overlay').style.display!=='none'&&e.target.tagName!=='TEXTAREA') saveItem();
    if(document.getElementById('rename-overlay').style.display!=='none') saveRename();
  }
});

// ── INIT ──────────────────────────────────────────────────────
load();
renderInventaire();
</script>
</body>
</html>
