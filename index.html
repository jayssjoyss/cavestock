<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Cave — Inventaire</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --noir: #0a0806;
    --bois: #1a1209;
    --brun: #2d1f0e;
    --or: #c9a84c;
    --or-pale: #e8c97a;
    --or-mat: #8b6914;
    --creme: #f0e6cc;
    --creme-pale: #faf4e8;
    --rouge: #7a1a1a;
    --rouge-vif: #a02020;
    --texte: #d4c4a0;
    --texte-pale: #8a7a60;
    --verre: rgba(255,255,255,0.04);
    --verre-bord: rgba(201,168,76,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Josefin Sans', sans-serif;
    background: var(--noir);
    color: var(--texte);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(122,26,26,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(45,31,14,0.8) 0%, transparent 50%),
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(201,168,76,0.01) 2px, rgba(201,168,76,0.01) 4px);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  /* HEADER */
  header {
    text-align: center;
    padding: 50px 0 40px;
    border-bottom: 1px solid var(--verre-bord);
    margin-bottom: 40px;
    position: relative;
  }

  header::after {
    content: '';
    display: block;
    width: 120px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--or), transparent);
    margin: 20px auto 0;
  }

  .header-icon {
    font-size: 2.4rem;
    display: block;
    margin-bottom: 10px;
    filter: drop-shadow(0 0 12px rgba(201,168,76,0.4));
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.4rem, 6vw, 3.8rem);
    font-weight: 300;
    letter-spacing: 0.12em;
    color: var(--or-pale);
    text-shadow: 0 0 40px rgba(201,168,76,0.25);
  }

  h1 em {
    font-style: italic;
    color: var(--creme);
    font-weight: 300;
  }

  .subtitle {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    color: var(--texte-pale);
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* TABS */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 36px;
    border: 1px solid var(--verre-bord);
    border-radius: 2px;
    overflow: hidden;
    background: var(--bois);
  }

  .tab-btn {
    flex: 1;
    padding: 14px 20px;
    background: transparent;
    border: none;
    color: var(--texte-pale);
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .tab-btn:not(:last-child) { border-right: 1px solid var(--verre-bord); }

  .tab-btn.active {
    color: var(--or);
    background: rgba(201,168,76,0.07);
  }

  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--or), transparent);
  }

  .tab-btn:hover:not(.active) {
    color: var(--texte);
    background: rgba(255,255,255,0.02);
  }

  .badge {
    background: var(--rouge);
    color: var(--creme-pale);
    font-size: 0.6rem;
    padding: 2px 6px;
    border-radius: 20px;
    letter-spacing: 0.05em;
    font-weight: 400;
    min-width: 20px;
    text-align: center;
  }

  /* PANELS */
  .panel { display: none; animation: fadeIn 0.4s ease; }
  .panel.active { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--verre);
    border: 1px solid var(--verre-bord);
    color: var(--creme);
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    padding: 11px 14px 11px 38px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--or-mat); }
  .search-wrap input::placeholder { color: var(--texte-pale); }

  .search-wrap::before {
    content: '🔍';
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.85rem;
    filter: grayscale(1) opacity(0.5);
  }

  .filter-select {
    background: var(--verre);
    border: 1px solid var(--verre-bord);
    color: var(--texte);
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    padding: 11px 14px;
    outline: none;
    cursor: pointer;
    min-width: 150px;
  }

  .filter-select option { background: var(--brun); }

  .btn {
    padding: 11px 20px;
    border: none;
    cursor: pointer;
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: all 0.25s ease;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .btn-or {
    background: linear-gradient(135deg, var(--or-mat), var(--or));
    color: var(--noir);
    font-weight: 400;
  }

  .btn-or:hover {
    background: linear-gradient(135deg, var(--or), var(--or-pale));
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(201,168,76,0.3);
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--verre-bord);
    color: var(--texte-pale);
  }

  .btn-ghost:hover {
    border-color: var(--or-mat);
    color: var(--or);
  }

  .btn-danger {
    background: transparent;
    border: 1px solid rgba(160,32,32,0.4);
    color: var(--rouge-vif);
  }

  .btn-danger:hover {
    background: rgba(160,32,32,0.15);
    border-color: var(--rouge-vif);
  }

  /* ITEMS GRID */
  .items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  .item-card {
    background: var(--bois);
    border: 1px solid var(--verre-bord);
    padding: 20px;
    position: relative;
    transition: all 0.3s ease;
    animation: cardIn 0.35s ease both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
  }

  .item-card:hover {
    border-color: rgba(201,168,76,0.3);
    background: rgba(29,18,9,0.95);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(201,168,76,0.1);
    transform: translateY(-2px);
  }

  .item-card.rupture {
    border-color: rgba(160,32,32,0.4);
    background: rgba(122,26,26,0.08);
  }

  .item-card.rupture::before {
    content: 'RUPTURE';
    position: absolute;
    top: 12px; right: 12px;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: var(--rouge-vif);
    border: 1px solid var(--rouge-vif);
    padding: 2px 7px;
    opacity: 0.8;
  }

  .item-cat {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--or-mat);
    margin-bottom: 6px;
  }

  .item-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.3rem;
    font-weight: 400;
    color: var(--creme-pale);
    margin-bottom: 4px;
    line-height: 1.2;
  }

  .item-detail {
    font-size: 0.68rem;
    color: var(--texte-pale);
    letter-spacing: 0.05em;
    margin-bottom: 14px;
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
  }

  .item-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-top: 1px solid var(--verre-bord);
    padding-top: 14px;
    margin-top: 6px;
  }

  .qty-control {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .qty-btn {
    width: 28px; height: 28px;
    background: var(--verre);
    border: 1px solid var(--verre-bord);
    color: var(--or);
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    line-height: 1;
  }

  .qty-btn:hover {
    background: rgba(201,168,76,0.12);
    border-color: var(--or-mat);
  }

  .qty-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 300;
    color: var(--or-pale);
    min-width: 30px;
    text-align: center;
    line-height: 1;
  }

  .qty-value.zero { color: var(--rouge-vif); }

  .qty-unit {
    font-size: 0.6rem;
    color: var(--texte-pale);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .item-actions {
    display: flex;
    gap: 6px;
  }

  .icon-btn {
    width: 30px; height: 30px;
    background: transparent;
    border: 1px solid var(--verre-bord);
    color: var(--texte-pale);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    transition: all 0.2s;
  }

  .icon-btn:hover { border-color: var(--or-mat); color: var(--or); }
  .icon-btn.del:hover { border-color: var(--rouge-vif); color: var(--rouge-vif); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--texte-pale);
  }

  .empty-state .icon { font-size: 3rem; display: block; margin-bottom: 16px; opacity: 0.4; }
  .empty-state p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-style: italic;
    margin-bottom: 20px;
  }

  /* SHOPPING LIST */
  .shopping-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .shopping-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 300;
    color: var(--or-pale);
  }

  .shopping-list-items { display: flex; flex-direction: column; gap: 10px; }

  .shop-item {
    background: var(--bois);
    border: 1px solid rgba(160,32,32,0.25);
    border-left: 3px solid var(--rouge-vif);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    animation: cardIn 0.3s ease both;
  }

  .shop-info { flex: 1; }

  .shop-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    color: var(--creme);
    margin-bottom: 2px;
  }

  .shop-cat {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    color: var(--texte-pale);
    text-transform: uppercase;
  }

  .shop-qty-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .shop-qty-label {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--texte-pale);
    text-transform: uppercase;
  }

  .shop-qty-input {
    width: 60px;
    background: rgba(201,168,76,0.07);
    border: 1px solid var(--or-mat);
    color: var(--or-pale);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    text-align: center;
    padding: 4px;
    outline: none;
  }

  .shop-qty-input:focus { border-color: var(--or); }

  .shop-check {
    width: 32px; height: 32px;
    background: transparent;
    border: 1px solid rgba(160,32,32,0.4);
    color: var(--rouge-vif);
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .shop-check:hover { background: rgba(160,32,32,0.15); }
  .shop-check.done { background: rgba(80,160,80,0.1); border-color: #50a050; color: #50a050; }

  .shop-item.done-item { opacity: 0.45; text-decoration: line-through; }

  .shop-empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--texte-pale);
  }

  .shop-empty .icon { font-size: 3rem; display: block; margin-bottom: 16px; opacity: 0.4; }
  .shop-empty p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-style: italic;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,3,2,0.88);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeOverlay 0.25s ease;
  }

  @keyframes fadeOverlay {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal {
    background: var(--brun);
    border: 1px solid var(--verre-bord);
    padding: 36px 32px;
    width: 100%;
    max-width: 480px;
    position: relative;
    animation: slideUp 0.3s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.6rem;
    font-weight: 300;
    color: var(--or-pale);
    margin-bottom: 6px;
  }

  .modal-sub {
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--texte-pale);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .modal::before {
    content: '';
    display: block;
    position: absolute;
    top: 0; left: 32px; right: 32px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--or), transparent);
  }

  .form-row { margin-bottom: 18px; }

  .form-row label {
    display: block;
    font-size: 0.63rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--texte-pale);
    margin-bottom: 7px;
  }

  .form-row input,
  .form-row select,
  .form-row textarea {
    width: 100%;
    background: rgba(10,8,6,0.6);
    border: 1px solid var(--verre-bord);
    color: var(--creme);
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.82rem;
    letter-spacing: 0.06em;
    padding: 11px 14px;
    outline: none;
    transition: border-color 0.2s;
    resize: vertical;
  }

  .form-row input:focus,
  .form-row select:focus,
  .form-row textarea:focus { border-color: var(--or-mat); }

  .form-row select option { background: var(--brun); }

  .form-row textarea { min-height: 70px; font-size: 0.78rem; }

  .form-row input[type="number"] { -moz-appearance: textfield; }
  .form-row input[type="number"]::-webkit-inner-spin-button { display: none; }

  .form-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

  .modal-footer {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--verre-bord);
  }

  .modal-close {
    position: absolute;
    top: 14px; right: 16px;
    background: transparent;
    border: none;
    color: var(--texte-pale);
    font-size: 1.2rem;
    cursor: pointer;
    padding: 4px 8px;
    transition: color 0.2s;
  }

  .modal-close:hover { color: var(--or); }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 0;
    margin-bottom: 28px;
    border: 1px solid var(--verre-bord);
    background: var(--bois);
    overflow: hidden;
  }

  .stat {
    flex: 1;
    padding: 16px 20px;
    text-align: center;
    border-right: 1px solid var(--verre-bord);
  }

  .stat:last-child { border-right: none; }

  .stat-val {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 300;
    color: var(--or-pale);
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-val.red { color: var(--rouge-vif); }

  .stat-label {
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--texte-pale);
  }

  /* CONFIRM DIALOG */
  #confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(5,3,2,0.85);
    z-index: 2000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    animation: fadeOverlay 0.2s ease;
  }

  .confirm-box {
    background: var(--brun);
    border: 1px solid var(--rouge-vif);
    border-top: 2px solid var(--rouge-vif);
    padding: 28px 28px 22px;
    width: 100%;
    max-width: 380px;
    animation: slideUp 0.25s ease;
    box-shadow: 0 16px 48px rgba(0,0,0,0.8);
  }

  .confirm-msg {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    color: var(--creme);
    margin-bottom: 22px;
    line-height: 1.5;
  }

  .confirm-btns {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--brun);
    border: 1px solid var(--or-mat);
    border-left: 3px solid var(--or);
    color: var(--creme);
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    padding: 12px 18px;
    z-index: 9999;
    animation: toastIn 0.3s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* CATEGORIES */
  .cat-add-row {
    display: flex;
    gap: 12px;
    margin-bottom: 28px;
    align-items: center;
  }

  .cat-input {
    flex: 1;
    background: var(--verre);
    border: 1px solid var(--verre-bord);
    color: var(--creme);
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.82rem;
    letter-spacing: 0.06em;
    padding: 11px 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  .cat-input:focus { border-color: var(--or-mat); }
  .cat-input::placeholder { color: var(--texte-pale); }

  .cat-list-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }

  .cat-card {
    background: var(--bois);
    border: 1px solid var(--verre-bord);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    transition: all 0.25s ease;
    animation: cardIn 0.3s ease both;
  }

  .cat-card:hover {
    border-color: rgba(201,168,76,0.3);
    transform: translateY(-1px);
  }

  .cat-card.default-cat {
    border-color: rgba(201,168,76,0.08);
    opacity: 0.7;
  }

  .cat-info { flex: 1; min-width: 0; }

  .cat-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.15rem;
    color: var(--creme-pale);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .cat-count {
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--texte-pale);
    margin-top: 3px;
  }

  .cat-count .count-num {
    color: var(--or-mat);
    font-weight: 400;
  }

  .cat-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .cat-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--texte-pale);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-style: italic;
    grid-column: 1 / -1;
  }

  /* SAUVEGARDE BAR */
  .save-bar {
    margin-top: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .save-bar-btn {
    background: transparent;
    border: 1px solid var(--verre-bord);
    color: var(--texte-pale);
    font-family: 'Josefin Sans', sans-serif;
    font-size: 0.63rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 7px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.25s;
  }

  .save-bar-btn:hover { border-color: var(--or-mat); color: var(--or); }
  .save-bar-btn.import:hover { border-color: #50a050; color: #6dba6d; }

  #last-save {
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    color: var(--texte-pale);
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
  }

  @media (max-width: 600px) {
    .stats-bar { display: grid; grid-template-columns: 1fr 1fr; }
    .stat { border-bottom: 1px solid var(--verre-bord); }
    .form-2col { grid-template-columns: 1fr; }
    .tab-btn { font-size: 0.6rem; padding: 12px 8px; }
    .cat-add-row { flex-wrap: wrap; }
    .cat-input { min-width: 100%; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <span class="header-icon">🍾</span>
    <h1><em>Ma</em> Cave</h1>
    <p class="subtitle">Gestion d'inventaire &middot; Stocks &amp; Approvisionnements</p>
    <div class="save-bar">
      <button class="save-bar-btn" onclick="exportData()">⬇ Exporter sauvegarde</button>
      <button class="save-bar-btn import" onclick="document.getElementById('import-file').click()">⬆ Importer sauvegarde</button>
      <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
      <span id="last-save"></span>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('inventaire', this)">
      🗃 Inventaire
    </button>
    <button class="tab-btn" onclick="switchTab('liste', this)" id="tab-liste">
      🛒 Liste d'achats <span class="badge" id="badge-liste">0</span>
    </button>
    <button class="tab-btn" onclick="switchTab('categories', this)">
      🏷 Catégories
    </button>
  </div>

  <!-- INVENTAIRE -->
  <div class="panel active" id="panel-inventaire">

    <div class="stats-bar" id="stats-bar"></div>

    <div class="toolbar">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Rechercher un article…" oninput="renderInventaire()">
      </div>
      <select class="filter-select" id="filter-cat" onchange="renderInventaire()">
        <option value="">Toutes catégories</option>
      </select>
      <button class="btn btn-ghost" onclick="toggleSort()">⇅ Trier</button>
      <button class="btn btn-or" onclick="openModal()">＋ Ajouter</button>
    </div>

    <div class="items-grid" id="items-grid"></div>
  </div>

  <!-- LISTE D'ACHATS -->
  <div class="panel" id="panel-liste">
    <div class="shopping-header">
      <div>
        <p class="subtitle">Articles épuisés à réapprovisionner</p>
        <h2 class="shopping-title">Liste d'Achats</h2>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-ghost" onclick="printListe()">🖨 Imprimer</button>
        <button class="btn btn-danger" onclick="clearDone()">✕ Effacer cochés</button>
      </div>
    </div>
    <div class="shopping-list-items" id="shopping-list"></div>
  </div>

  <!-- CATEGORIES -->
  <div class="panel" id="panel-categories">
    <div class="shopping-header">
      <div>
        <p class="subtitle">Organiser l'inventaire</p>
        <h2 class="shopping-title">Catégories</h2>
      </div>
    </div>

    <div class="cat-add-row">
      <input type="text" id="new-cat-input" class="cat-input" placeholder="Nom de la nouvelle catégorie…" onkeydown="if(event.key==='Enter') addCategory()">
      <button class="btn btn-or" onclick="addCategory()">＋ Créer</button>
    </div>

    <div id="cat-list"></div>
  </div>
</div>

<!-- MODAL RENOMMER CATEGORIE -->
<div class="modal-overlay" id="rename-overlay" style="display:none" onclick="if(event.target===this)closeRename()">
  <div class="modal" style="max-width:400px">
    <button class="modal-close" onclick="closeRename()">✕</button>
    <h2 class="modal-title">Renommer</h2>
    <p class="modal-sub">Modifier le nom de la catégorie</p>
    <div class="form-row">
      <label>Nouveau nom *</label>
      <input type="text" id="rename-input" placeholder="Nouveau nom…" onkeydown="if(event.key==='Enter') saveRename()">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeRename()">Annuler</button>
      <button class="btn btn-or" onclick="saveRename()">Renommer</button>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" style="display:none" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 class="modal-title" id="modal-title">Nouvel article</h2>
    <p class="modal-sub" id="modal-sub">Ajouter à l'inventaire</p>

    <div class="form-row">
      <label>Nom de l'article *</label>
      <input type="text" id="f-nom" placeholder="ex: Château Margaux 2018">
    </div>
    <div class="form-2col">
    <div class="form-row">
      <label>Catégorie *</label>
      <select id="f-cat">
        <option value="">Choisir…</option>
      </select>
    </div>
      <div class="form-row">
        <label>Unité</label>
        <select id="f-unit">
          <option value="bouteille(s)">bouteille(s)</option>
          <option value="canette(s)">canette(s)</option>
          <option value="boîte(s)">boîte(s)</option>
          <option value="pack(s)">pack(s)</option>
          <option value="litre(s)">litre(s)</option>
          <option value="kg">kg</option>
          <option value="unité(s)">unité(s)</option>
        </select>
      </div>
    </div>
    <div class="form-2col">
      <div class="form-row">
        <label>Quantité en stock *</label>
        <input type="number" id="f-qty" placeholder="0" min="0">
      </div>
      <div class="form-row">
        <label>Seuil d'alerte</label>
        <input type="number" id="f-seuil" placeholder="0" min="0" title="Ajout auto à la liste si ≤ ce seuil">
      </div>
    </div>
    <div class="form-row">
      <label>Notes / Millésime / Référence</label>
      <textarea id="f-notes" placeholder="Détails, cave, étagère…"></textarea>
    </div>

    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-or" onclick="saveItem()">Enregistrer</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// DATA
// ============================================================
const STORAGE_KEY = 'cave_inventaire_v2';
let items = [];
let categories = [];
let editId = null;
let sortAsc = true;
let doneItems = {};
let renameOldName = null;

const DEFAULT_CATS = ['Vin rouge','Vin blanc','Vin rosé','Champagne','Bière','Spiritueux','Eau','Soda','Jus','Autre boisson','Conserves','Epicerie sèche','Autre'];

function load() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    const data = JSON.parse(raw);
    items = data.items || [];
    doneItems = data.doneItems || {};
    categories = data.categories || [...DEFAULT_CATS];
  } else {
    items = getSampleData();
    categories = [...DEFAULT_CATS];
  }
  save();
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ items, doneItems, categories }));
}

function getSampleData() {
  return [
    { id: uid(), nom: 'Château Margaux 2018', cat: 'Vin rouge', qty: 6, unit: 'bouteille(s)', notes: 'Cave basse — étagère 3', seuil: 2 },
    { id: uid(), nom: 'Blanc de Blanc Sancerre', cat: 'Vin blanc', qty: 0, unit: 'bouteille(s)', notes: '', seuil: 1 },
    { id: uid(), nom: 'Perrier-Jouët Grand Brut', cat: 'Champagne', qty: 3, unit: 'bouteille(s)', notes: 'Réfrigérateur cave', seuil: 1 },
    { id: uid(), nom: 'Heineken 50cl', cat: 'Bière', qty: 0, unit: 'canette(s)', notes: '', seuil: 6 },
    { id: uid(), nom: 'Whisky Glenfiddich 12 ans', cat: 'Spiritueux', qty: 1, unit: 'bouteille(s)', notes: '', seuil: 1 },
    { id: uid(), nom: 'Eau Evian 1.5L', cat: 'Eau', qty: 12, unit: 'bouteille(s)', notes: 'Stock tournant', seuil: 6 },
  ];
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

// ============================================================
// TABS
// ============================================================
function switchTab(tab, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  (btn || event.currentTarget).classList.add('active');
  if (tab === 'liste') renderShoppingList();
  if (tab === 'categories') renderCategories();
}

// ============================================================
// RENDER INVENTAIRE
// ============================================================
function renderInventaire() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const catFilter = document.getElementById('filter-cat').value;

  let filtered = items.filter(it => {
    const matchSearch = it.nom.toLowerCase().includes(search) ||
      (it.notes || '').toLowerCase().includes(search) ||
      it.cat.toLowerCase().includes(search);
    const matchCat = !catFilter || it.cat === catFilter;
    return matchSearch && matchCat;
  });

  if (sortAsc) filtered.sort((a, b) => a.nom.localeCompare(b.nom));
  else filtered.sort((a, b) => b.qty - a.qty);

  const grid = document.getElementById('items-grid');

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <span class="icon">🍾</span>
      <p>Aucun article trouvé</p>
      <button class="btn btn-or" onclick="openModal()">＋ Ajouter un article</button>
    </div>`;
  } else {
    grid.innerHTML = filtered.map(it => cardHTML(it)).join('');
  }

  updateStats();
  updateCatFilter();
  updateBadge();
}

function cardHTML(it) {
  const rupture = it.qty === 0;
  const alerte = it.seuil > 0 && it.qty <= it.seuil && !rupture;
  return `<div class="item-card ${rupture ? 'rupture' : ''}" id="card-${it.id}">
    <div class="item-cat">${it.cat}</div>
    <div class="item-name">${escHtml(it.nom)}</div>
    ${it.notes ? `<div class="item-detail">${escHtml(it.notes)}</div>` : '<div style="margin-bottom:14px"></div>'}
    ${alerte ? `<div style="font-size:0.6rem;letter-spacing:0.15em;color:#c9a84c;margin:-8px 0 10px;text-transform:uppercase;">⚠ Stock bas</div>` : ''}
    <div class="item-footer">
      <div class="qty-control">
        <button class="qty-btn" onclick="changeQty('${it.id}',-1)">−</button>
        <div>
          <div class="qty-value ${it.qty === 0 ? 'zero' : ''}">${it.qty}</div>
          <div class="qty-unit">${it.unit}</div>
        </div>
        <button class="qty-btn" onclick="changeQty('${it.id}',1)">＋</button>
      </div>
      <div class="item-actions">
        <button class="icon-btn" onclick="openModal('${it.id}')" title="Modifier">✏</button>
        <button class="icon-btn del" onclick="deleteItem('${it.id}')" title="Supprimer">🗑</button>
      </div>
    </div>
  </div>`;
}

function updateStats() {
  const total = items.length;
  const rupture = items.filter(i => i.qty === 0).length;
  const alerte = items.filter(i => i.seuil > 0 && i.qty > 0 && i.qty <= i.seuil).length;
  const totalQty = items.reduce((s, i) => s + i.qty, 0);

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><span class="stat-val">${total}</span><span class="stat-label">Articles</span></div>
    <div class="stat"><span class="stat-val">${totalQty}</span><span class="stat-label">Unités totales</span></div>
    <div class="stat"><span class="stat-val ${alerte ? 'red' : ''}">${alerte}</span><span class="stat-label">Stock bas</span></div>
    <div class="stat"><span class="stat-val ${rupture ? 'red' : ''}">${rupture}</span><span class="stat-label">Ruptures</span></div>
  `;
}

function updateCatFilter() {
  const sel = document.getElementById('filter-cat');
  const current = sel.value;
  sel.innerHTML = '<option value="">Toutes catégories</option>' +
    [...categories].sort().map(c => `<option value="${c}" ${c === current ? 'selected' : ''}>${c}</option>`).join('');
}

function updateBadge() {
  const count = getShoppingItems().length;
  document.getElementById('badge-liste').textContent = count;
}

function toggleSort() {
  sortAsc = !sortAsc;
  renderInventaire();
  toast(sortAsc ? 'Tri : A → Z' : 'Tri : Stock décroissant');
}

// ============================================================
// QUANTITY
// ============================================================
function changeQty(id, delta) {
  const it = items.find(i => i.id === id);
  if (!it) return;
  it.qty = Math.max(0, it.qty + delta);
  save();
  renderInventaire();
  if (it.qty === 0) toast(`⚠ ${it.nom} — Rupture de stock !`);
}

// ============================================================
// CRUD
// ============================================================
function openModal(id = null) {
  editId = id;
  document.getElementById('modal-overlay').style.display = 'flex';
  document.getElementById('modal-title').textContent = id ? 'Modifier l\'article' : 'Nouvel article';
  document.getElementById('modal-sub').textContent = id ? 'Mise à jour de l\'inventaire' : 'Ajouter à l\'inventaire';

  // Populate categories dynamically
  const catSel = document.getElementById('f-cat');
  catSel.innerHTML = '<option value="">Choisir…</option>' +
    categories.sort().map(c => `<option value="${c}">${c}</option>`).join('');

  if (id) {
    const it = items.find(i => i.id === id);
    if (it) {
      document.getElementById('f-nom').value = it.nom;
      catSel.value = it.cat;
      document.getElementById('f-unit').value = it.unit;
      document.getElementById('f-qty').value = it.qty;
      document.getElementById('f-seuil').value = it.seuil || 0;
      document.getElementById('f-notes').value = it.notes || '';
    }
  } else {
    document.getElementById('f-nom').value = '';
    catSel.value = '';
    document.getElementById('f-unit').value = 'bouteille(s)';
    document.getElementById('f-qty').value = '';
    document.getElementById('f-seuil').value = 0;
    document.getElementById('f-notes').value = '';
  }

  setTimeout(() => document.getElementById('f-nom').focus(), 100);
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  editId = null;
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function saveItem() {
  const nom = document.getElementById('f-nom').value.trim();
  const cat = document.getElementById('f-cat').value;
  const unit = document.getElementById('f-unit').value;
  const qty = parseInt(document.getElementById('f-qty').value) || 0;
  const seuil = parseInt(document.getElementById('f-seuil').value) || 0;
  const notes = document.getElementById('f-notes').value.trim();

  if (!nom) { alert('Le nom est obligatoire.'); return; }
  if (!cat) { alert('La catégorie est obligatoire.'); return; }

  if (editId) {
    const it = items.find(i => i.id === editId);
    if (it) { it.nom = nom; it.cat = cat; it.unit = unit; it.qty = qty; it.seuil = seuil; it.notes = notes; }
    toast('Article mis à jour');
  } else {
    items.push({ id: uid(), nom, cat, unit, qty, seuil, notes });
    toast('Article ajouté à l\'inventaire');
  }

  save();
  closeModal();
  renderInventaire();
}

function deleteItem(id) {
  const it = items.find(i => i.id === id);
  if (!it) return;
  showConfirm(`Supprimer "${it.nom}" ?`, () => {
    items = items.filter(i => i.id !== id);
    save();
    renderInventaire();
    toast('Article supprimé');
  });
}

// ============================================================
// SHOPPING LIST
// ============================================================
function getShoppingItems() {
  return items.filter(i => i.qty === 0 || (i.seuil > 0 && i.qty <= i.seuil));
}

function renderShoppingList() {
  const shopItems = getShoppingItems();
  const container = document.getElementById('shopping-list');

  if (shopItems.length === 0) {
    container.innerHTML = `<div class="shop-empty">
      <span class="icon">✅</span>
      <p>Tous les stocks sont au complet.<br><em>Votre cave est bien approvisionnée.</em></p>
    </div>`;
    return;
  }

  container.innerHTML = shopItems.map(it => {
    const done = doneItems[it.id];
    const suggested = Math.max(1, (it.seuil || 0) * 2 || 6);
    return `<div class="shop-item ${done ? 'done-item' : ''}" id="shop-${it.id}">
      <div class="shop-info">
        <div class="shop-name">${escHtml(it.nom)}</div>
        <div class="shop-cat">${it.cat} — ${it.qty === 0 ? 'Rupture' : `Stock bas (${it.qty} ${it.unit})`}</div>
      </div>
      <div class="shop-qty-wrap">
        <span class="shop-qty-label">À acheter</span>
        <input class="shop-qty-input" type="number" value="${suggested}" min="1" id="shopqty-${it.id}">
        <span class="shop-qty-label">${it.unit}</span>
      </div>
      <button class="shop-check ${done ? 'done' : ''}" onclick="toggleDone('${it.id}')" title="${done ? 'Décocher' : 'Marquer acheté'}">
        ${done ? '✓' : '○'}
      </button>
    </div>`;
  }).join('');

  updateBadge();
}

function toggleDone(id) {
  doneItems[id] = !doneItems[id];
  save();
  renderShoppingList();
}

function clearDone() {
  const done = Object.keys(doneItems).filter(k => doneItems[k]);
  if (done.length === 0) { toast('Aucun article coché'); return; }
  showConfirm(`Mettre à jour le stock pour les ${done.length} article(s) coché(s) ?`, () => {
    done.forEach(id => {
      const it = items.find(i => i.id === id);
      const qtyEl = document.getElementById('shopqty-' + id);
      const qty = qtyEl ? parseInt(qtyEl.value) || 0 : 0;
      if (it) it.qty = it.qty + qty;
      delete doneItems[id];
    });
    save();
    renderInventaire();
    renderShoppingList();
    toast(`${done.length} articles réapprovisionnés ✓`);
  });
}

function printListe() {
  const items = getShoppingItems();
  if (items.length === 0) { toast('Liste vide, rien à imprimer'); return; }

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>Liste d'achats — Ma Cave</title>
  <style>
    body { font-family: Georgia, serif; padding: 40px; color: #111; }
    h1 { font-size: 1.8rem; margin-bottom: 4px; }
    p.date { font-size: 0.8rem; color: #777; margin-bottom: 28px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; border-bottom: 2px solid #333; padding: 8px 12px; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; }
    td { padding: 10px 12px; border-bottom: 1px solid #ddd; font-size: 0.9rem; }
    .qty { width: 80px; }
    input[type=checkbox] { width: 16px; height: 16px; }
  </style></head><body>
  <h1>🍾 Liste d'achats — Ma Cave</h1>
  <p class="date">Générée le ${new Date().toLocaleDateString('fr-FR', {weekday:'long',year:'numeric',month:'long',day:'numeric'})}</p>
  <table>
    <thead><tr><th>✓</th><th>Article</th><th>Catégorie</th><th>Statut</th><th class="qty">Qté à acheter</th></tr></thead>
    <tbody>
      ${items.map(it => `<tr>
        <td><input type="checkbox"></td>
        <td>${it.nom}</td>
        <td>${it.cat}</td>
        <td>${it.qty === 0 ? 'Rupture' : 'Stock bas (' + it.qty + ')'}</td>
        <td>${Math.max(1,(it.seuil||0)*2||6)} ${it.unit}</td>
      </tr>`).join('')}
    </tbody>
  </table>
  </body></html>`;

  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  win.print();
}

// ============================================================
// CATEGORIES
// ============================================================
function renderCategories() {
  const container = document.getElementById('cat-list');
  const sorted = [...categories].sort();

  if (sorted.length === 0) {
    container.innerHTML = `<div class="cat-list-grid"><div class="cat-empty">Aucune catégorie. Créez-en une ci-dessus.</div></div>`;
    return;
  }

  const html = sorted.map((cat, idx) => {
    const count = items.filter(i => i.cat === cat).length;
    const isDefault = DEFAULT_CATS.includes(cat);
    return `<div class="cat-card ${isDefault ? 'default-cat' : ''}">
      <div class="cat-info">
        <div class="cat-name">${escHtml(cat)}</div>
        <div class="cat-count">
          <span class="count-num">${count}</span> article${count !== 1 ? 's' : ''}
          ${isDefault ? ' · par défaut' : ''}
        </div>
      </div>
      <div class="cat-actions">
        <button class="icon-btn" data-cat-rename="${idx}" title="Renommer">✏</button>
        <button class="icon-btn del" data-cat-delete="${idx}" title="Supprimer">🗑</button>
      </div>
    </div>`;
  }).join('');

  container.innerHTML = `<div class="cat-list-grid">${html}</div>`;

  // Attach events via data attributes to avoid escaping issues
  container.querySelectorAll('[data-cat-rename]').forEach(btn => {
    btn.addEventListener('click', () => openRename(sorted[+btn.dataset.catRename]));
  });
  container.querySelectorAll('[data-cat-delete]').forEach(btn => {
    btn.addEventListener('click', () => deleteCategory(sorted[+btn.dataset.catDelete]));
  });
}

function addCategory() {
  const input = document.getElementById('new-cat-input');
  const name = input.value.trim();
  if (!name) { toast('Entrez un nom de catégorie'); return; }
  if (categories.some(c => c.toLowerCase() === name.toLowerCase())) {
    toast('Cette catégorie existe déjà'); return;
  }
  categories.push(name);
  save();
  input.value = '';
  renderCategories();
  toast(`Catégorie "${name}" créée`);
}

function deleteCategory(cat) {
  const count = items.filter(i => i.cat === cat).length;
  const msg = count > 0
    ? `Supprimer "${cat}" ? Les ${count} article(s) seront déplacés en "Sans catégorie".`
    : `Supprimer la catégorie "${cat}" ?`;
  showConfirm(msg, () => {
    if (count > 0) {
      items.forEach(i => { if (i.cat === cat) i.cat = 'Sans catégorie'; });
      if (!categories.includes('Sans catégorie')) categories.push('Sans catégorie');
    }
    categories = categories.filter(c => c !== cat);
    save();
    renderCategories();
    renderInventaire();
    toast(`Catégorie "${cat}" supprimée`);
  });
}

function openRename(cat) {
  renameOldName = cat;
  document.getElementById('rename-input').value = cat;
  document.getElementById('rename-overlay').style.display = 'flex';
  setTimeout(() => {
    const inp = document.getElementById('rename-input');
    inp.focus(); inp.select();
  }, 100);
}

function closeRename() {
  document.getElementById('rename-overlay').style.display = 'none';
  renameOldName = null;
}

function saveRename() {
  const newName = document.getElementById('rename-input').value.trim();
  if (!newName) { toast('Entrez un nom valide'); return; }
  if (newName === renameOldName) { closeRename(); return; }
  if (categories.some(c => c.toLowerCase() === newName.toLowerCase())) {
    toast('Ce nom existe déjà'); return;
  }
  // Update all items using old cat name
  items.forEach(i => { if (i.cat === renameOldName) i.cat = newName; });
  categories = categories.map(c => c === renameOldName ? newName : c);
  save();
  closeRename();
  renderCategories();
  renderInventaire();
  toast(`Renommé en "${newName}"`);
}

// ============================================================
// CONFIRM DIALOG (remplace confirm() bloqué sur mobile)
// ============================================================
function showConfirm(msg, onOk) {
  const old = document.getElementById('confirm-overlay');
  if (old) old.remove();

  const el = document.createElement('div');
  el.id = 'confirm-overlay';
  el.innerHTML = `
    <div class="confirm-box">
      <p class="confirm-msg">${escHtml(msg)}</p>
      <div class="confirm-btns">
        <button class="btn btn-ghost" id="confirm-cancel">Annuler</button>
        <button class="btn btn-danger" id="confirm-ok">Supprimer</button>
      </div>
    </div>`;
  document.body.appendChild(el);

  document.getElementById('confirm-cancel').onclick = () => el.remove();
  document.getElementById('confirm-ok').onclick = () => { el.remove(); onOk(); };
}

// ============================================================
// UTILS
// ============================================================
function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal();
    closeRename();
  }
  if (e.key === 'Enter' && document.getElementById('modal-overlay').style.display !== 'none') {
    if (e.target.tagName !== 'TEXTAREA') saveItem();
  }
});

// ============================================================
// EXPORT / IMPORT
// ============================================================
function exportData() {
  const data = { items, doneItems, categories, exportedAt: new Date().toISOString(), version: 2 };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toLocaleDateString('fr-FR').replace(/\//g, '-');
  a.href = url;
  a.download = `cave-sauvegarde-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('✓ Sauvegarde exportée');
  updateLastSave();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.items || !Array.isArray(data.items)) throw new Error('Format invalide');
      showConfirm(`Importer "${file.name}" ?\nCela remplacera toutes les données actuelles.`, () => {
        items = data.items || [];
        doneItems = data.doneItems || {};
        categories = data.categories || [...DEFAULT_CATS];
        save();
        renderInventaire();
        toast('✓ Données importées avec succès');
        updateLastSave();
      });
    } catch(err) {
      toast('⚠ Fichier invalide — import annulé');
    }
  };
  reader.readAsText(file);
  // Reset input pour pouvoir réimporter le même fichier
  event.target.value = '';
}

function updateLastSave() {
  const el = document.getElementById('last-save');
  if (!el) return;
  const now = new Date().toLocaleString('fr-FR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
  el.textContent = `Dernière sauvegarde : ${now}`;
}

// ============================================================
// INIT
// ============================================================
load();
renderInventaire();

</script>
